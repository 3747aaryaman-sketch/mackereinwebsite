<script>

/* PARTICLES */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let particles=[];

for(let i=0;i<90;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5)*0.6,
dy:(Math.random()-0.5)*0.6
});

}

function animateParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.8)";
ctx.fill();

});

requestAnimationFrame(animateParticles);

}

animateParticles();



/* MUSIC VISUALIZER */

const audio=document.getElementById("bgMusic");
const visCanvas=document.getElementById("visualizer");
const vCtx=visCanvas.getContext("2d");

function resizeVisualizer(){
visCanvas.width=visCanvas.offsetWidth;
visCanvas.height=120;
}

resizeVisualizer();
window.addEventListener("resize",resizeVisualizer);

let audioContext;
let analyser;
let source;
let dataArray;
let bufferLength;

audio.addEventListener("play",()=>{

if(!audioContext){

audioContext=new (window.AudioContext || window.webkitAudioContext)();

analyser=audioContext.createAnalyser();
source=audioContext.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioContext.destination);

analyser.fftSize=256;

bufferLength=analyser.frequencyBinCount;
dataArray=new Uint8Array(bufferLength);

drawVisualizer();

}

audioContext.resume();

});

function drawVisualizer(){

requestAnimationFrame(drawVisualizer);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

vCtx.clearRect(0,0,visCanvas.width,visCanvas.height);

let barWidth=(visCanvas.width/bufferLength)*2;
let x=0;

for(let i=0;i<bufferLength;i++){

let barHeight=dataArray[i]/1.8;

vCtx.fillStyle="rgb(255,0,80)";
vCtx.fillRect(x,visCanvas.height-barHeight,barWidth,barHeight);

x+=barWidth+1;

}

}



/* AUTOPLAY FIX */

const music=document.getElementById("bgMusic");

window.addEventListener("load",()=>{
music.play().catch(()=>{});
});

function enableSound(){

music.muted=false;
music.play();

document.removeEventListener("click",enableSound);
document.removeEventListener("touchstart",enableSound);
document.removeEventListener("keydown",enableSound);

}

document.addEventListener("click",enableSound);
document.addEventListener("touchstart",enableSound);
document.addEventListener("keydown",enableSound);

</script>
