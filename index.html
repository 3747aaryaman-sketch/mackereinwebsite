<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aaryaman Shrivastav</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* CUSTOM CURSOR */

body{
cursor:url("/cursor.cur"), auto;
}

/* page layout */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Georgia, "Times New Roman", serif;
overflow:hidden;
color:white;
background:url("/background.jpeg") center/cover no-repeat fixed;
}

/* dark overlay */

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

/* grid effect */

body::after{
content:"";
position:absolute;
inset:0;

background-image:
linear-gradient(rgba(255,0,80,0.12) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,0,80,0.12) 1px,transparent 1px);

background-size:60px 60px;
pointer-events:none;
}

/* particles */

#particles{
position:absolute;
inset:0;
z-index:0;
}

/* card */

.card{

position:relative;
z-index:2;

padding:70px 90px;

border-radius:25px;

background:rgba(0,0,0,0.45);

backdrop-filter:blur(18px);

border:1px solid rgba(255,0,80,0.35);

box-shadow:0 0 50px rgba(255,0,80,0.35);

text-align:center;

max-width:520px;

transition:0.4s;

}

.card:hover{
box-shadow:0 0 80px rgba(255,0,80,0.7);
}

/* title */

h1{

font-size:44px;

letter-spacing:6px;

margin-bottom:12px;

text-transform:uppercase;

text-shadow:0 0 10px rgba(255,255,255,0.5);

}

/* subtitle */

p{

font-size:18px;

letter-spacing:1.5px;

opacity:0.9;

}

/* visualizer */

#visualizer{

width:100%;

height:120px;

margin-top:35px;

}

/* audio */

audio{

margin-top:25px;

width:100%;

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="card">

<h1>Aaryaman Shrivastav</h1>

<p>I like philosophy and music</p>

<canvas id="visualizer"></canvas>

<audio id="bgMusic" autoplay loop muted>

<source src="/meaningful-love-instrumental.mp3" type="audio/mpeg">

</audio>

</div>

<script>

/* PARTICLE BACKGROUND */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let particles=[];

for(let i=0;i<90;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5)*0.6,
dy:(Math.random()-0.5)*0.6
});

}

function animateParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.8)";
ctx.fill();

});

requestAnimationFrame(animateParticles);

}

animateParticles();



/* MUSIC VISUALIZER */

const audio=document.getElementById("bgMusic");
const visCanvas=document.getElementById("visualizer");
const vCtx=visCanvas.getContext("2d");

function resizeVisualizer(){
visCanvas.width=visCanvas.offsetWidth;
visCanvas.height=120;
}

resizeVisualizer();
window.addEventListener("resize",resizeVisualizer);

let audioContext;
let analyser;
let source;
let dataArray;
let bufferLength;

audio.addEventListener("play",()=>{

if(!audioContext){

audioContext=new (window.AudioContext || window.webkitAudioContext)();

analyser=audioContext.createAnalyser();
source=audioContext.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioContext.destination);

analyser.fftSize=256;

bufferLength=analyser.frequencyBinCount;
dataArray=new Uint8Array(bufferLength);

drawVisualizer();

}

audioContext.resume();

});

function drawVisualizer(){

requestAnimationFrame(drawVisualizer);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

vCtx.clearRect(0,0,visCanvas.width,visCanvas.height);

let barWidth=(visCanvas.width/bufferLength)*2;
let x=0;

for(let i=0;i<bufferLength;i++){

let barHeight=dataArray[i]/1.8;

vCtx.fillStyle="rgb(255,0,80)";
vCtx.fillRect(x,visCanvas.height-barHeight,barWidth,barHeight);

x+=barWidth+1;

}

}



/* AUTOPLAY FIX */

const music=document.getElementById("bgMusic");

window.addEventListener("load",()=>{
music.play().catch(()=>{});
});

function enableSound(){

music.muted=false;
music.play();

document.removeEventListener("click",enableSound);
document.removeEventListener("touchstart",enableSound);
document.removeEventListener("keydown",enableSound);

}

document.addEventListener("click",enableSound);
document.addEventListener("touchstart",enableSound);
document.addEventListener("keydown",enableSound);

</script>

</body>

</html>
