<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aaryaman</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
font-family:Inter,system-ui,Arial;

display:flex;
align-items:center;
justify-content:center;

background:url("background.jpeg") center/cover no-repeat fixed;

color:white;

}

/* dark overlay */

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(3px);
}

/* main card */

.card{

position:relative;

width:420px;
max-width:90%;

padding:50px 40px;

border-radius:26px;

text-align:center;

background:rgba(255,255,255,0.06);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 20px 60px rgba(0,0,0,0.5),
inset 0 0 30px rgba(255,255,255,0.04);

transition:.4s;

}

.card:hover{

transform:translateY(-6px);

box-shadow:
0 30px 80px rgba(0,0,0,0.7),
inset 0 0 40px rgba(255,255,255,0.05);

}

/* profile picture */

.pfp{

width:130px;
height:130px;

border-radius:50%;

object-fit:cover;

margin-bottom:20px;

border:2px solid rgba(255,255,255,0.3);

box-shadow:
0 0 30px rgba(255,255,255,0.25);

}

/* name */

h1{

font-size:34px;

letter-spacing:3px;

margin-bottom:10px;

}

/* bio */

.bio{

opacity:.85;

font-size:15px;

margin-bottom:25px;

line-height:1.5;

}

/* divider */

.divider{

width:60px;
height:2px;

background:white;

margin:20px auto;

opacity:.4;

}

/* buttons */

.links{

display:flex;

justify-content:center;

gap:14px;

flex-wrap:wrap;

margin-top:20px;

}

.link{

padding:10px 18px;

border-radius:10px;

text-decoration:none;

font-size:14px;

color:white;

border:1px solid rgba(255,255,255,0.3);

background:rgba(255,255,255,0.05);

transition:.25s;

}

.link:hover{

background:white;
color:black;

transform:translateY(-2px);

}

/* footer */

.footer{

margin-top:30px;

font-size:12px;

opacity:.6;

}

</style>

</head>

<body>

<div class="card">

<img src="pfp.jpeg" class="pfp">

<h1>Aaryaman</h1>

<div class="bio">
Student at DPS International<br>
Interested in philosophy, debate, and music
</div>

<div class="divider"></div>

<div class="links">

<a class="link"
href="https://www.instagram.com/aaryaman_shrivastav/?hl=en"
target="_blank">
Instagram </a>

<a class="link"
href="https://youtube.com/@Mackerein"
target="_blank">
YouTube </a>

</div>

<div class="footer">
© Aaryaman
</div>

</div>

</body>
</html>
