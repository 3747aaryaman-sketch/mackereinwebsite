<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mac</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Georgia,serif;
color:white;
overflow:hidden;
background:url("/background.gif") center/cover no-repeat fixed;
cursor:url("cursor.cur"), auto;
padding:20px;
}

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

/* loader */

#loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(25px);
z-index:999;
cursor:pointer;
transition:opacity 1s;
}

#loader.hidden{
opacity:0;
pointer-events:none;
}

.loader-text{
font-size:24px;
letter-spacing:4px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:.4}
50%{opacity:1}
}

/* card */

.card{
position:relative;
z-index:2;
width:100%;
max-width:520px;
padding:60px;
border-radius:26px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.15);
text-align:center;
box-shadow:0 0 60px rgba(255,0,80,0.25);
}

/* pfp */

.pfp{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin-bottom:18px;
border:2px solid rgba(255,255,255,0.3);
box-shadow:0 0 30px rgba(255,0,80,0.7);
}

/* name */

h1{
font-size:44px;
letter-spacing:6px;
margin-bottom:12px;
}

/* bio */

.bio{
font-size:17px;
opacity:.9;
margin-bottom:15px;
}

/* quote */

.quote{
font-size:15px;
opacity:.85;
margin-bottom:30px;
}

/* waveform */

#wave{
width:100%;
height:120px;
display:block;
margin:25px auto;
}

/* speaker */

.speaker-btn{
margin-top:10px;
background:none;
border:none;
cursor:pointer;
}

.speaker-btn svg{
width:30px;
fill:white;
}

/* socials */

.socials{
margin-top:25px;
display:flex;
gap:12px;
justify-content:center;
}

.social-btn{
padding:10px 18px;
border-radius:12px;
background:rgba(255,0,80,0.15);
border:1px solid rgba(255,0,80,0.4);
color:white;
text-decoration:none;
font-size:14px;
transition:.3s;
}

.social-btn:hover{
background:rgba(255,0,80,0.5);
box-shadow:0 0 20px rgba(255,0,80,.8);
}

</style>
</head>

<body>

<div id="loader">
<div class="loader-text">greetings.</div>
</div>

<div class="card">

<img src="/pfp.jpeg" class="pfp">

<h1>mac</h1>

<div class="bio">User suspected of being too cool</div>

<div class="quote">the greatest prison is thinking you are free</div>

<canvas id="wave"></canvas>

<button class="speaker-btn" id="speakerBtn">
<svg viewBox="0 0 24 24">
<path d="M3 9v6h4l5 4V5L7 9H3z"/>
</svg>
</button>

<audio id="music" loop muted>
<source src="/meaningful-love-instrumental.mp3">
</audio>

<div class="socials">
<a class="social-btn" href="https://www.instagram.com/mackerein/" target="_blank">Instagram</a>
<a class="social-btn" href="https://youtube.com/@Mackerein" target="_blank">YouTube</a>
</div>

</div>

<script>

/* loader */

const loader=document.getElementById("loader")
const audio=document.getElementById("music")

document.addEventListener("click",unlock)

function unlock(){

loader.classList.add("hidden")

audio.muted=false
audio.play()

initAudio()

document.removeEventListener("click",unlock)

}

/* audio */

let audioCtx
let analyser
let dataArray

function initAudio(){

audioCtx=new (window.AudioContext||window.webkitAudioContext)()

analyser=audioCtx.createAnalyser()
analyser.fftSize=2048

const source=audioCtx.createMediaElementSource(audio)

source.connect(analyser)
analyser.connect(audioCtx.destination)

dataArray=new Uint8Array(analyser.frequencyBinCount)

draw()

}

/* waveform visualizer */

const canvas=document.getElementById("wave")
const ctx=canvas.getContext("2d")

function resize(){

canvas.width=canvas.offsetWidth
canvas.height=120

}

resize()
window.addEventListener("resize",resize)

function draw(){

requestAnimationFrame(draw)

if(!analyser) return

analyser.getByteTimeDomainData(dataArray)

ctx.clearRect(0,0,canvas.width,canvas.height)

const centerY=canvas.height/2

/* gradient */

const gradient=ctx.createLinearGradient(0,0,canvas.width,0)

gradient.addColorStop(0,"#ff6a00")
gradient.addColorStop(0.25,"#ffd000")
gradient.addColorStop(0.5,"#ff00c8")
gradient.addColorStop(0.75,"#a000ff")
gradient.addColorStop(1,"#5a00ff")

ctx.strokeStyle=gradient
ctx.lineWidth=3
ctx.shadowBlur=25
ctx.shadowColor="#ff00c8"

ctx.beginPath()

let slice=dataArray.length/canvas.width

for(let i=0;i<canvas.width;i++){

let v=dataArray[Math.floor(i*slice)]/128.0
let y=centerY+(v-1)*50

if(i===0){
ctx.moveTo(i,y)
}else{
ctx.lineTo(i,y)
}

}

ctx.stroke()

}

/* speaker */

document.getElementById("speakerBtn").onclick=()=>{
audio.muted=!audio.muted
}

</script>

</body>
</html>
