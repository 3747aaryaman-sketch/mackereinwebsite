<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>mac</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Georgia,serif;
color:white;
overflow:hidden;
background:url("/background.gif") center/cover no-repeat fixed;
padding:20px;
}

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

.card{
position:relative;
z-index:2;
width:100%;
max-width:520px;
padding:60px 50px;
border-radius:25px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.15);
text-align:center;
box-shadow:0 0 50px rgba(255,0,80,0.3);
}

.pfp{
width:110px;
height:110px;
border-radius:50%;
margin-bottom:15px;
border:2px solid rgba(255,255,255,0.4);
box-shadow:0 0 30px rgba(255,0,80,0.7);
}

h1{
font-size:42px;
letter-spacing:6px;
margin-bottom:10px;
}

.bio{
opacity:.9;
margin-bottom:20px;
font-size:17px;
}

.quote{
font-size:15px;
opacity:.85;
margin-bottom:30px;
}

/* waveform */

#wave{
width:100%;
height:140px;
display:block;
margin:25px auto;
}

/* speaker */

.speaker{
background:none;
border:none;
cursor:pointer;
margin-bottom:20px;
}

.speaker svg{
width:28px;
fill:white;
opacity:.9;
}

/* socials */

.socials{
display:flex;
justify-content:center;
gap:12px;
}

.social{
padding:9px 16px;
border-radius:10px;
border:1px solid rgba(255,0,80,0.4);
background:rgba(255,0,80,0.15);
color:white;
text-decoration:none;
font-size:14px;
transition:.3s;
}

.social:hover{
background:rgba(255,0,80,0.5);
box-shadow:0 0 20px rgba(255,0,80,0.8);
}

</style>

</head>

<body>

<div class="card">

<img src="/pfp.jpeg" class="pfp">

<h1>mac</h1>

<div class="bio">User suspected of being too cool</div>

<div class="quote">the greatest prison is thinking you are free</div>

<canvas id="wave"></canvas>

<button class="speaker" id="speakerBtn">

<svg viewBox="0 0 24 24">
<path d="M3 9v6h4l5 4V5L7 9H3z"/>
</svg>

</button>

<audio id="music" loop muted>
<source src="/meaningful-love-instrumental.mp3">
</audio>

<div class="socials">

<a class="social" href="https://www.instagram.com/mackerein/" target="_blank">Instagram</a>

<a class="social" href="https://youtube.com/@Mackerein" target="_blank">YouTube</a>

</div>

</div>

<script>

/* unlock audio */

const audio=document.getElementById("music")

document.addEventListener("click",()=>{
audio.muted=false
audio.play()
initAudio()
},{once:true})

/* audio setup */

let audioCtx
let analyser
let dataArray

function initAudio(){

audioCtx=new (window.AudioContext||window.webkitAudioContext)()

analyser=audioCtx.createAnalyser()
analyser.fftSize=2048

const source=audioCtx.createMediaElementSource(audio)

source.connect(analyser)
analyser.connect(audioCtx.destination)

dataArray=new Uint8Array(analyser.frequencyBinCount)

draw()

}

/* waveform visualizer */

const canvas=document.getElementById("wave")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=canvas.offsetWidth
canvas.height=140
}

resize()
window.addEventListener("resize",resize)

function draw(){

requestAnimationFrame(draw)

if(!analyser) return

analyser.getByteTimeDomainData(dataArray)

ctx.clearRect(0,0,canvas.width,canvas.height)

const centerX=canvas.width/2
const centerY=canvas.height/2

/* gradient */

const gradient=ctx.createLinearGradient(0,0,canvas.width,0)

gradient.addColorStop(0,"#ff5e00")
gradient.addColorStop(0.3,"#ffd000")
gradient.addColorStop(0.6,"#ff00c8")
gradient.addColorStop(1,"#6a00ff")

ctx.strokeStyle=gradient
ctx.lineWidth=3
ctx.shadowBlur=20
ctx.shadowColor="#ff00c8"

/* draw waveform */

ctx.beginPath()

let slice=dataArray.length/canvas.width

for(let i=0;i<canvas.width;i++){

let v=dataArray[Math.floor(i*slice)]/128.0
let y=v*40

ctx.lineTo(centerX+i/2,centerY+y)
ctx.lineTo(centerX-i/2,centerY+y)

}

ctx.stroke()

}

/* speaker */

const btn=document.getElementById("speakerBtn")

btn.onclick=()=>{
audio.muted=!audio.muted
}

</script>

</body>
</html>
