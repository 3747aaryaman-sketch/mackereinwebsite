<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>A.S</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100dvh;
display:flex;
align-items:center;
justify-content:center;

font-family:Georgia,serif;
color:white;

background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url("/background.jpeg") center/cover no-repeat fixed;

overflow:hidden;

}

/* particles */

#particles{
position:absolute;
inset:0;
z-index:0;
}

/* loader */

#loader{

position:fixed;
inset:0;

display:flex;
align-items:center;
justify-content:center;

background:black;

z-index:999;

cursor:pointer;

}

.loader-text{

font-size:22px;
letter-spacing:6px;

opacity:.7;

}

/* glass card */

.card{

position:relative;
z-index:2;

padding:60px 70px;

border-radius:26px;

background:rgba(255,255,255,0.06);
backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 0 120px rgba(255,0,90,.25),
inset 0 0 25px rgba(255,255,255,.05);

text-align:center;

max-width:520px;
width:90%;

}

/* name */

h1{

font-size:48px;
letter-spacing:6px;

margin-bottom:10px;

text-shadow:
0 0 15px white,
0 0 30px #ff0050;

}

/* bio */

.bio{

font-size:17px;
opacity:.85;
margin-bottom:30px;

}

/* quotes */

.quote{

font-size:14px;
opacity:.65;

margin-bottom:35px;

}

/* VISUALIZER */

#visualizer{

width:100%;
height:100px;

}

/* socials */

.socials{

margin-top:30px;

display:flex;
justify-content:center;
gap:18px;

}

.social-btn{

padding:10px 18px;

border-radius:10px;

background:rgba(255,0,80,0.15);
border:1px solid rgba(255,0,80,0.4);

color:white;
text-decoration:none;

transition:.25s;

}

.social-btn:hover{

background:rgba(255,0,80,0.5);
box-shadow:0 0 25px rgba(255,0,80,.9);

}

/* glow */

.card::after{

content:"";

position:absolute;
inset:-40px;

background:radial-gradient(circle,#ff005055,transparent 70%);

z-index:-1;
filter:blur(60px);

}

</style>

</head>

<body>

<div id="loader">
<div class="loader-text">CLICK</div>
</div>

<canvas id="particles"></canvas>

<div class="card">

<h1>A.S</h1>

<p class="bio">
Student @DPSI • Learning Tabla
</p>

<p class="quote">
"clarity begins when faith sleeps"
</p>

<canvas id="visualizer"></canvas>

<audio id="music" loop muted>
<source src="/meaningful-love-instrumental.mp3">
</audio>

<div class="socials">

<a class="social-btn"
href="https://instagram.com/aaryaman_shrivastav"
target="_blank">
Instagram
</a>

<a class="social-btn"
href="https://youtube.com/@Mackerein"
target="_blank">
YouTube
</a>

</div>

</div>

<script>

/* loader */

const loader=document.getElementById("loader")
const audio=document.getElementById("music")

document.addEventListener("click",()=>{

loader.style.display="none"

audio.muted=false
audio.play()

initAudio()

})

/* particles */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let particles=[]

for(let i=0;i<90;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

dx:(Math.random()-.5)*.3,
dy:(Math.random()-.5)*.3,

r:Math.random()*2

})

}

function animateParticles(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>canvas.width)p.dx*=-1
if(p.y<0||p.y>canvas.height)p.dy*=-1

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

})

requestAnimationFrame(animateParticles)

}

animateParticles()

/* VISUALIZER */

const vis=document.getElementById("visualizer")
const vctx=vis.getContext("2d")

vis.width=vis.offsetWidth
vis.height=100

let audioCtx,analyser,source,dataArray

function initAudio(){

audioCtx=new(window.AudioContext||webkitAudioContext)()

analyser=audioCtx.createAnalyser()
analyser.fftSize=256

source=audioCtx.createMediaElementSource(audio)

source.connect(analyser)
analyser.connect(audioCtx.destination)

dataArray=new Uint8Array(analyser.frequencyBinCount)

draw()

}

function draw(){

requestAnimationFrame(draw)

if(!analyser)return

analyser.getByteFrequencyData(dataArray)

vctx.clearRect(0,0,vis.width,vis.height)

let bars=70
let spacing=vis.width/bars

let center=vis.height/2

let active=32

for(let i=0;i<bars;i++){

let x=i*spacing

let isActive=i>(bars/2-active/2)&&i<(bars/2+active/2)

if(isActive){

let index=Math.floor((i/bars)*dataArray.length)
let value=dataArray[index]/255

let height=value*60

drawBar(x,center-height,height*2,spacing*.5)

}else{

drawBar(x,center-1,2,spacing*.5)

}

}

}

function drawBar(x,y,h,w){

let r=w/2

vctx.beginPath()

vctx.moveTo(x+r,y)

vctx.lineTo(x+w-r,y)

vctx.quadraticCurveTo(x+w,y,x+w,y+r)

vctx.lineTo(x+w,y+h-r)

vctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)

vctx.lineTo(x+r,y+h)

vctx.quadraticCurveTo(x,y+h,x,y+h-r)

vctx.lineTo(x,y+r)

vctx.quadraticCurveTo(x,y,x+r,y)

vctx.closePath()

vctx.fillStyle="white"

vctx.shadowColor="#ff0050"
vctx.shadowBlur=12

vctx.fill()

}

</script>

</body>
</html>
