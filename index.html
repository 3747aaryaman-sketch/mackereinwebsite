<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A.S</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Georgia,serif;
overflow:hidden;
color:white;
background:url("/background.jpeg") center/cover no-repeat fixed;
cursor:url("cursor.cur"), auto;
}

/* overlay */

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

/* enter screen */

#loader{
position:fixed;
inset:0;
backdrop-filter:blur(25px);
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
transition:opacity 1s ease;
cursor:pointer;
}

#loader.hidden{
opacity:0;
pointer-events:none;
}

.loader-text{
font-size:24px;
letter-spacing:4px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:0.4}
50%{opacity:1}
}

/* particles */

#particles{
position:absolute;
inset:0;
z-index:0;
}

/* card */

.card{
position:relative;
z-index:2;
padding:60px 80px;
border-radius:25px;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(18px);
border:1px solid rgba(255,0,80,0.35);
box-shadow:0 0 60px rgba(255,0,80,0.25);
text-align:center;
max-width:520px;
}

/* name */

h1{
font-size:46px;
letter-spacing:6px;
margin-bottom:15px;
text-transform:uppercase;
min-height:54px;
}

.name-letter{
opacity:0;
display:inline-block;
transform:translateY(20px);
}

.name-letter.show{
opacity:1;
transform:translateY(0);
text-shadow:0 0 10px #fff,0 0 25px #ff0050;
transition:all 0.4s ease;
}

/* bio */

.bio{
font-size:18px;
opacity:0.9;
margin-bottom:30px;
min-height:24px;
}

.cursor{
display:inline-block;
width:2px;
height:18px;
background:white;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

/* quotes */

.quote-section{
margin-bottom:30px;
min-height:40px;
position:relative;
overflow:hidden;
}

.quote{
position:absolute;
width:100%;
opacity:0;
transform:translateY(10px);
transition:all 0.8s ease;
font-size:17px;
}

.quote.active{
opacity:1;
transform:translateY(0);
}

/* visualizer */

#visualizer{
width:100%;
height:120px;
}

/* socials */

.socials{
margin-top:30px;
display:flex;
gap:20px;
justify-content:center;
}

.social-btn{
padding:10px 18px;
border-radius:12px;
background:rgba(255,0,80,0.15);
border:1px solid rgba(255,0,80,0.4);
color:white;
text-decoration:none;
font-size:15px;
transition:0.3s;
cursor:url("cursor.cur"), pointer;
}

.social-btn:hover{
background:rgba(255,0,80,0.5);
box-shadow:0 0 20px rgba(255,0,80,0.9);
transform:scale(1.05);
}

</style>

</head>

<body>

<div id="loader">
<div class="loader-text">Enter...</div>
</div>

<canvas id="particles"></canvas>

<div class="card">

<h1 id="username"></h1>

<p class="bio">
<span id="typewriter"></span><span class="cursor"></span>
</p>

<div class="quote-section">
<div class="quote active">clarity begins when faith sleeps</div>
<div class="quote">some people prefer comfort over truth</div>
<div class="quote">the greatest prison is thinking you are free</div>
<div class="quote">morals are just a man made concept</div>
</div>

<canvas id="visualizer"></canvas>

<audio id="bgMusic" loop muted>
<source src="/meaningful-love-instrumental.mp3" type="audio/mpeg">
</audio>

<div class="socials">

<a class="social-btn" target="_blank"
href="https://www.instagram.com/aaryaman_shrivastav/?hl=en">
Instagram
</a>

<a class="social-btn" target="_blank"
href="https://youtube.com/@Mackerein">
YouTube
</a>

</div>

</div>

<script>

/* unlock screen */

const loader=document.getElementById("loader");
const audio=document.getElementById("bgMusic");

function unlock(){

loader.classList.add("hidden");

audio.muted=false;
audio.play();

initAudio();
revealName();

document.removeEventListener("click",unlock);

}

document.addEventListener("click",unlock);

/* name reveal */

const name="A.S";
const nameContainer=document.getElementById("username");

name.split("").forEach(letter=>{
const span=document.createElement("span");
span.textContent=letter;
span.classList.add("name-letter");
nameContainer.appendChild(span);
});

function revealName(){

const letters=document.querySelectorAll(".name-letter");

letters.forEach((l,i)=>{
setTimeout(()=>{
l.classList.add("show");
},i*70);
});

}

/* particles */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let particles=[];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5)*0.5,
dy:(Math.random()-0.5)*0.5
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();
});

requestAnimationFrame(animate);

}

animate();

/* typewriter */

const texts=[
"Student @DPSI",
"Learning Tabla",
"Some Depths Are Too Hard To Escape"
];

let textIndex=0;
let charIndex=0;
let typing=true;

const typeElement=document.getElementById("typewriter");

function typeEffect(){

const currentText=texts[textIndex];

if(typing){

typeElement.textContent=currentText.substring(0,charIndex+1);
charIndex++;

if(charIndex===currentText.length){
typing=false;
setTimeout(typeEffect,1000);
return;
}

}else{

typeElement.textContent=currentText.substring(0,charIndex-1);
charIndex--;

if(charIndex===0){
typing=true;
textIndex=(textIndex+1)%texts.length;
}

}

setTimeout(typeEffect, typing ? 40 : 25);

}

typeEffect();

/* quotes */

const quotes=document.querySelectorAll(".quote");
let current=0;

setInterval(()=>{
quotes[current].classList.remove("active");
current=(current+1)%quotes.length;
quotes[current].classList.add("active");
},5000);

/* audio visualizer */

const vis=document.getElementById("visualizer");
const vctx=vis.getContext("2d");

vis.width=vis.offsetWidth;
vis.height=120;

let audioCtx;
let analyser;
let source;
let dataArray;
let bufferLength;

function initAudio(){

if(audioCtx) return;

audioCtx=new (window.AudioContext||window.webkitAudioContext)();

analyser=audioCtx.createAnalyser();

source=audioCtx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize=256;

bufferLength=analyser.frequencyBinCount;

dataArray=new Uint8Array(bufferLength);

draw();

}

function draw(){

requestAnimationFrame(draw);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

vctx.clearRect(0,0,vis.width,vis.height);

let barWidth=(vis.width/bufferLength)*2;
let x=0;

for(let i=0;i<bufferLength;i++){

let h=dataArray[i]/1.8;

vctx.fillStyle="rgb(255,0,80)";
vctx.fillRect(x,vis.height-h,barWidth,h);

x+=barWidth+1;

}

}

</script>

</body>
</html>
