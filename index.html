<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aaryaman Shrivastav</title>

<style>
600;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family: Georgia, "Times New Roman", serif;
  color:white;
  background:url("background.jpg") center/cover no-repeat fixed;
}

/* dark overlay */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

/* grid HUD effect */
body::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:linear-gradient(rgba(255,0,60,0.15) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,0,60,0.15) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

#particles{
  position:absolute;
  inset:0;
  z-index:0;
}

.card{
  position:relative;
  z-index:2;
  backdrop-filter: blur(18px);
  background: rgba(0,0,0,0.45);
  border:1px solid rgba(255,0,80,0.5);
  border-radius:22px;
  padding:80px 100px;
  text-align:center;
  box-shadow:0 0 40px rgba(255,0,80,0.5);
  transform-style:preserve-3d;
  transition:transform 0.2s ease;
}

h1{
  font-size:48px;
  margin-bottom:16px;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#ff004c;
  text-shadow:
    0 0 10px #ff004c,
    0 0 20px #ff004c,
    0 0 40px #ff004c;
}

p{
  font-size:20px;
  letter-spacing:2px;
  color:#ffffff;
  opacity:0.9;
}

.visualizer{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:40px;
  height:40px;
}

.bar{
  width:5px;
  height:10px;
  background:#ff004c;
  box-shadow:0 0 10px #ff004c;
  animation:music 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:0.2s}
.bar:nth-child(3){animation-delay:0.4s}
.bar:nth-child(4){animation-delay:0.6s}
.bar:nth-child(5){animation-delay:0.8s}

@keyframes music{
  0%{height:8px}
  50%{height:35px}
  100%{height:8px}
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<audio id="bgMusic" controls loop>
  <source src="meaningful-love-instrumental.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<div class="card" id="card">
  <h1>Aaryaman Shrivastav</h1>
  <p>i like philosophy and music</p>

  <div class="visualizer">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</div>

<script>
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<90;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    dx:(Math.random()-0.5)*0.5,
    dy:(Math.random()-0.5)*0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.7)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

const card=document.getElementById("card");

document.addEventListener("mousemove",e=>{
  const x=(window.innerWidth/2-e.clientX)/25;
  const y=(window.innerHeight/2-e.clientY)/25;
  card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

window.addEventListener("resize",()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});

</script>

</body>
</html>
