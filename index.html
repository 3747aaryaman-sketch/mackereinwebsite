<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A.S</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Georgia,serif;
overflow:hidden;
color:white;
background:url("/background.jpeg") center/cover no-repeat fixed;
cursor:url("cursor.cur"), auto;
}

/* dark overlay */

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

/* loader */

#loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(30px);
z-index:999;
cursor:pointer;
transition:opacity 1s;
}

#loader.hidden{
opacity:0;
pointer-events:none;
}

.loader-text{
font-size:24px;
letter-spacing:4px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:.4}
50%{opacity:1}
}

/* particles */

#particles{
position:absolute;
inset:0;
z-index:0;
}

/* glass card */

.card{
position:relative;
z-index:2;
padding:60px 80px;
border-radius:28px;

background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px) saturate(180%);

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 0 80px rgba(255,0,80,0.25),
inset 0 0 25px rgba(255,255,255,0.05);

text-align:center;
max-width:520px;

transition:transform .2s ease;
}

/* name */

h1{
font-size:46px;
letter-spacing:6px;
margin-bottom:15px;
min-height:54px;
}

.name-letter{
opacity:0;
display:inline-block;
transform:translateY(20px);
}

.name-letter.show{
opacity:1;
transform:translateY(0);
text-shadow:0 0 15px #fff,0 0 30px #ff0050;
transition:.4s;
}

/* bio */

.bio{
font-size:18px;
margin-bottom:30px;
opacity:.9;
}

.cursor{
display:inline-block;
width:2px;
height:18px;
background:white;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1}
25%,75%{opacity:0}
}

/* quotes */

.quote-section{
position:relative;
height:40px;
margin-bottom:30px;
overflow:hidden;
}

.quote{
position:absolute;
width:100%;
opacity:0;
transform:translateY(10px);
transition:.8s;
}

.quote.active{
opacity:1;
transform:translateY(0);
}

/* visualizer */

#visualizer{
width:100%;
height:120px;
}

/* socials */

.socials{
margin-top:30px;
display:flex;
gap:20px;
justify-content:center;
}

.social-btn{

padding:10px 18px;
border-radius:12px;

background:rgba(255,0,80,0.15);
border:1px solid rgba(255,0,80,0.4);

color:white;
text-decoration:none;

transition:.3s;
}

.social-btn:hover{
background:rgba(255,0,80,0.5);
box-shadow:0 0 25px rgba(255,0,80,.9);
transform:scale(1.05);
}

</style>

</head>

<body>

<div id="loader">
<div class="loader-text">Enter...</div>
</div>

<canvas id="particles"></canvas>

<div class="card" id="card">

<h1 id="username"></h1>

<p class="bio">
<span id="typewriter"></span><span class="cursor"></span>
</p>

<div class="quote-section">
<div class="quote active">clarity begins when faith sleeps</div>
<div class="quote">some people prefer comfort over truth</div>
<div class="quote">the greatest prison is thinking you are free</div>
<div class="quote">morals are just a man made concept</div>
</div>

<canvas id="visualizer"></canvas>

<audio id="bgMusic" loop muted>
<source src="/meaningful-love-instrumental.mp3">
</audio>

<div class="socials">

<a class="social-btn" target="_blank"
href="https://www.instagram.com/aaryaman_shrivastav/?hl=en">
Instagram
</a>

<a class="social-btn" target="_blank"
href="https://youtube.com/@Mackerein">
YouTube
</a>

</div>

</div>

<script>

/* loader */

const loader=document.getElementById("loader")
const audio=document.getElementById("bgMusic")

document.addEventListener("click",unlock)

function unlock(){

loader.classList.add("hidden")

audio.muted=false
audio.play()

initAudio()
revealName()

document.removeEventListener("click",unlock)

}

/* animated name */

const name="A.S"
const nameContainer=document.getElementById("username")

name.split("").forEach(l=>{
const span=document.createElement("span")
span.textContent=l
span.classList.add("name-letter")
nameContainer.appendChild(span)
})

function revealName(){

document.querySelectorAll(".name-letter")
.forEach((l,i)=>{

setTimeout(()=>l.classList.add("show"),i*80)

})

}

/* mouse reactive particles */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

let mouse={x:0,y:0}

window.addEventListener("mousemove",e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let particles=[]

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

dx:(Math.random()-.5)*.5,
dy:(Math.random()-.5)*.5,

r:Math.random()*2+1

})

}

function animateParticles(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

let dist=Math.hypot(mouse.x-p.x,mouse.y-p.y)

if(dist<120){

p.x+=(p.x-mouse.x)/25
p.y+=(p.y-mouse.y)/25

}

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>canvas.width) p.dx*=-1
if(p.y<0||p.y>canvas.height) p.dy*=-1

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

})

requestAnimationFrame(animateParticles)

}

animateParticles()

/* typewriter */

const texts=[
"Student @DPSI",
"Learning Tabla",
"Some Depths Are Too Hard To Escape"
]

let textIndex=0
let charIndex=0
let typing=true

const typeElement=document.getElementById("typewriter")

function typeEffect(){

let current=texts[textIndex]

if(typing){

typeElement.textContent=current.substring(0,charIndex++)
if(charIndex>current.length){
typing=false
setTimeout(typeEffect,1000)
return
}

}else{

typeElement.textContent=current.substring(0,charIndex--)
if(charIndex==0){
typing=true
textIndex=(textIndex+1)%texts.length
}

}

setTimeout(typeEffect,typing?40:25)

}

typeEffect()

/* quotes */

const quotes=document.querySelectorAll(".quote")
let current=0

setInterval(()=>{

quotes[current].classList.remove("active")
current=(current+1)%quotes.length
quotes[current].classList.add("active")

},5000)

/* spotify style visualizer */

const vis=document.getElementById("visualizer")
const vctx=vis.getContext("2d")

vis.width=vis.offsetWidth
vis.height=120

let audioCtx
let analyser
let source
let dataArray

function initAudio(){

audioCtx=new (window.AudioContext||window.webkitAudioContext)()

analyser=audioCtx.createAnalyser()
analyser.fftSize=256

source=audioCtx.createMediaElementSource(audio)

source.connect(analyser)
analyser.connect(audioCtx.destination)

dataArray=new Uint8Array(analyser.frequencyBinCount)

draw()

}

function draw(){

requestAnimationFrame(draw)

if(!analyser) return

analyser.getByteFrequencyData(dataArray)

vctx.clearRect(0,0,vis.width,vis.height)

let center=vis.height/2
let bars=70
let spacing=vis.width/bars
let active=32

for(let i=0;i<bars;i++){

let x=i*spacing

let isActive=i>(bars/2-active/2)&&i<(bars/2+active/2)

if(isActive){

let index=Math.floor((i/bars)*dataArray.length)

let value=dataArray[index]/255

let height=value*70

vctx.fillStyle="rgb(255,0,80)"

/* up */

vctx.fillRect(x,center-height,spacing*.6,height)

/* down */

vctx.fillRect(x,center,spacing*.6,height)

}else{

vctx.fillStyle="rgba(255,0,80,.4)"
vctx.fillRect(x,center-1,spacing*.6,2)

}

}

}

</script>

</body>
</html>
