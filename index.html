<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aaryaman</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,system-ui,Arial;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
background:#0a0a0a;
}

/* background */

#bg{
position:absolute;
inset:0;
background:
radial-gradient(circle at 30% 30%, #ff005030 0%, transparent 50%),
radial-gradient(circle at 70% 70%, #ff005030 0%, transparent 50%);
filter:blur(80px);
}

/* particles */

canvas#particles{
position:absolute;
inset:0;
}

/* card */

.card{

position:relative;
z-index:2;

width:420px;
max-width:90%;

padding:40px;

border-radius:28px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.12);

box-shadow:
0 0 60px rgba(255,0,80,0.15),
inset 0 0 20px rgba(255,255,255,0.04);

text-align:center;

}

/* pfp */

.avatar-wrap{
position:relative;
width:140px;
height:140px;
margin:auto;
}

.avatar{

width:140px;
height:140px;

border-radius:50%;
object-fit:cover;

border:2px solid rgba(255,255,255,0.2);

box-shadow:0 0 35px rgba(255,0,80,.6);

position:relative;
z-index:2;
}

/* circular visualizer */

#ring{
position:absolute;
top:-10px;
left:-10px;
width:160px;
height:160px;
}

/* name */

h1{
margin-top:20px;
font-size:34px;
letter-spacing:4px;
}

/* bio */

.bio{
margin-top:8px;
opacity:.8;
font-size:15px;
min-height:20px;
}

.cursor{
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0}
}

/* quotes */

.quote{
margin-top:18px;
font-size:14px;
opacity:.7;
min-height:20px;
}

/* socials */

.socials{

margin-top:28px;

display:flex;
justify-content:center;
gap:12px;

}

.social{

padding:10px 16px;

border-radius:10px;

border:1px solid rgba(255,0,80,0.4);
background:rgba(255,0,80,0.15);

color:white;
text-decoration:none;

font-size:14px;

transition:.25s;

}

.social:hover{

background:rgba(255,0,80,0.5);
transform:translateY(-2px);

}

/* audio */

.audio-btn{
margin-top:18px;
cursor:pointer;
background:none;
border:none;
}

.audio-btn svg{
width:26px;
height:26px;
fill:white;
opacity:.85;
}

</style>

</head>

<body>

<div id="bg"></div>

<canvas id="particles"></canvas>

<div class="card">

<div class="avatar-wrap">

<canvas id="ring"></canvas>

<img src="/pfp.jpeg" class="avatar">

</div>

<h1>A.S</h1>

<div class="bio">
<span id="type"></span><span class="cursor">|</span>
</div>

<div class="quote" id="quote"></div>

<button class="audio-btn" id="audioBtn">

<svg id="audioIcon" viewBox="0 0 24 24">
<path d="M3 9v6h4l5 4V5L7 9H3z"/>
</svg>

</button>

<div class="socials">

<a class="social"
href="https://www.instagram.com/aaryaman_shrivastav/?hl=en"
target="_blank">
Instagram </a>

<a class="social"
href="https://youtube.com/@Mackerein"
target="_blank">
YouTube </a>

</div>

</div>

<audio id="music" loop>
<source src="/meaningful-love-instrumental.mp3">
</audio>

<script>

/* particles */

const pCanvas=document.getElementById("particles")
const pCtx=pCanvas.getContext("2d")

function resize(){
pCanvas.width=innerWidth
pCanvas.height=innerHeight
}
resize()
addEventListener("resize",resize)

let particles=[]

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*pCanvas.width,
y:Math.random()*pCanvas.height,
dx:(Math.random()-.5)*.3,
dy:(Math.random()-.5)*.3
})
}

function animateParticles(){

pCtx.clearRect(0,0,pCanvas.width,pCanvas.height)

particles.forEach(p=>{

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>pCanvas.width)p.dx*=-1
if(p.y<0||p.y>pCanvas.height)p.dy*=-1

pCtx.beginPath()
pCtx.arc(p.x,p.y,1.2,0,Math.PI*2)
pCtx.fillStyle="white"
pCtx.fill()

})

requestAnimationFrame(animateParticles)

}

animateParticles()

/* typewriter */

const texts=[
"Student @ DPSI",
"Learning Tabla",
"Thinking Too Much"
]

let ti=0
let ci=0
let typing=true

const type=document.getElementById("type")

function typeLoop(){

let t=texts[ti]

if(typing){
type.textContent=t.slice(0,ci++)
if(ci>t.length){typing=false;setTimeout(typeLoop,1000);return}
}
else{
type.textContent=t.slice(0,ci--)
if(ci==0){typing=true;ti=(ti+1)%texts.length}
}

setTimeout(typeLoop,typing?40:25)

}

typeLoop()

/* quotes */

const quotes=[
"clarity begins when faith sleeps",
"comfort is the enemy of truth",
"thinking freely is rare",
"most prisons are invisible"
]

let qi=0
const quote=document.getElementById("quote")

setInterval(()=>{
quote.textContent=quotes[qi]
qi=(qi+1)%quotes.length
},4000)

quote.textContent=quotes[0]

/* audio */

const music=document.getElementById("music")
const btn=document.getElementById("audioBtn")
const icon=document.getElementById("audioIcon")

let playing=false

btn.onclick=()=>{

playing=!playing

if(playing){
music.play()
icon.innerHTML=`<path d="M3 9v6h4l5 4V5L7 9H3z"/>`
}else{
music.pause()
icon.innerHTML=`<path d="M3 9v6h4l5 4V5L7 9H3z"/><line x1="18" y1="6" x2="22" y2="18" stroke="white" stroke-width="2"/>`
}

}

/* circular visualizer */

const ring=document.getElementById("ring")
const rCtx=ring.getContext("2d")

ring.width=160
ring.height=160

let audioCtx, analyser, dataArray

function initAudio(){

audioCtx=new AudioContext()

analyser=audioCtx.createAnalyser()
analyser.fftSize=256

let src=audioCtx.createMediaElementSource(music)

src.connect(analyser)
analyser.connect(audioCtx.destination)

dataArray=new Uint8Array(analyser.frequencyBinCount)

drawRing()

}

music.addEventListener("play",initAudio,{once:true})

function drawRing(){

requestAnimationFrame(drawRing)

if(!analyser)return

analyser.getByteFrequencyData(dataArray)

rCtx.clearRect(0,0,160,160)

let cx=80
let cy=80

for(let i=0;i<60;i++){

let v=dataArray[i]/255

let angle=(i/60)*Math.PI*2

let r1=70
let r2=70+v*20

let x1=cx+Math.cos(angle)*r1
let y1=cy+Math.sin(angle)*r1

let x2=cx+Math.cos(angle)*r2
let y2=cy+Math.sin(angle)*r2

rCtx.beginPath()
rCtx.moveTo(x1,y1)
rCtx.lineTo(x2,y2)

rCtx.strokeStyle="rgb(255,0,80)"
rCtx.lineWidth=2
rCtx.stroke()

}

}

</script>

</body>
</html>
