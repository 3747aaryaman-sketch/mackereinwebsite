<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A.S</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100dvh;
display:flex;
align-items:center;
justify-content:center;
font-family:Georgia,serif;
overflow:hidden;
color:white;
background:url("/background.gif") center/cover no-repeat fixed;
cursor:url("cursor.cur"), auto;
padding:20px;
}

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

/* loader */

#loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(25px);
z-index:999;
cursor:pointer;
transition:opacity 1s;
}

#loader.hidden{
opacity:0;
pointer-events:none;
}

.loader-text{
font-size:clamp(18px,3vw,26px);
letter-spacing:4px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{opacity:.4}
50%{opacity:1}
}

/* particles */

#particles{
position:absolute;
inset:0;
z-index:0;
}

/* card */

.card{
position:relative;
z-index:2;
width:100%;
max-width:520px;
padding:clamp(30px,5vw,60px);
border-radius:26px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px) saturate(180%);
border:1px solid rgba(255,255,255,0.15);
box-shadow:
0 0 60px rgba(255,0,80,0.25),
inset 0 0 25px rgba(255,255,255,0.05);
text-align:center;
}

/* pfp */

.pfp{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin:0 auto 18px auto;
display:block;
border:2px solid rgba(255,255,255,0.3);
box-shadow:
0 0 25px rgba(255,0,80,0.6),
0 0 60px rgba(255,0,80,0.25);
}

/* name */

h1{
font-size:clamp(32px,7vw,46px);
letter-spacing:5px;
margin-bottom:15px;
min-height:54px;
}

.name-letter{
opacity:0;
display:inline-block;
transform:translateY(20px);
}

.name-letter.show{
opacity:1;
transform:translateY(0);
text-shadow:
0 0 15px #fff,
0 0 30px #ff0050;
transition:.4s;
}

/* bio */

.bio{
font-size:clamp(14px,3vw,18px);
margin-bottom:25px;
opacity:.9;
min-height:22px;
}

.cursor{
display:inline-block;
width:2px;
height:18px;
background:white;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1}
25%,75%{opacity:0}
}

/* quotes */

.quote-section{
position:relative;
height:40px;
margin-bottom:25px;
overflow:hidden;
font-size:clamp(13px,3vw,16px);
}

.quote{
position:absolute;
width:100%;
opacity:0;
transform:translateY(10px);
transition:.8s;
}

.quote.active{
opacity:1;
transform:translateY(0);
}

/* visualizer */

#visualizer{
width:100%;
height:110px;
margin-top:10px;
}

/* speaker */

.speaker-btn{
margin-top:10px;
background:none;
border:none;
cursor:pointer;
}

.speaker-btn svg{
width:28px;
height:28px;
fill:white;
opacity:.85;
}

/* socials */

.socials{
margin-top:25px;
display:flex;
flex-wrap:wrap;
gap:12px;
justify-content:center;
}

.social-btn{
padding:10px 18px;
border-radius:12px;
background:rgba(255,0,80,0.15);
border:1px solid rgba(255,0,80,0.4);
color:white;
text-decoration:none;
font-size:14px;
transition:.3s;
}

.social-btn:hover{
background:rgba(255,0,80,0.5);
box-shadow:0 0 25px rgba(255,0,80,.9);
transform:scale(1.05);
}

</style>

</head>

<body>

<div id="loader">
<div class="loader-text">Loading...Click to Enter!</div>
</div>

<canvas id="particles"></canvas>

<div class="card">

<img src="/pfp.jpeg" class="pfp">

<h1 id="username"></h1>

<p class="bio">
<span id="typewriter"></span><span class="cursor"></span>
</p>

<div class="quote-section">
<div class="quote active">clarity begins when faith sleeps</div>
<div class="quote">some people prefer comfort over truth</div>
<div class="quote">the greatest prison is thinking you are free</div>
<div class="quote">morals are just a man made concept</div>
</div>

<canvas id="visualizer"></canvas>

<button class="speaker-btn" id="speakerBtn">
<svg id="speakerIcon" viewBox="0 0 24 24">
<path d="M3 9v6h4l5 4V5L7 9H3z"/>
</svg>
</button>

<audio id="bgMusic" loop muted>
<source src="/meaningful-love-instrumental.mp3">
</audio>

<div class="socials">
<a class="social-btn" href="https://www.instagram.com/aaryaman_shrivastav/?hl=en" target="_blank">Instagram</a>
<a class="social-btn" href="https://youtube.com/@Mackerein" target="_blank">YouTube</a>
</div>

</div>

<script>

/* loader */

const loader=document.getElementById("loader")
const audio=document.getElementById("bgMusic")

document.addEventListener("click",unlock)

function unlock(){
loader.classList.add("hidden")
audio.muted=false
audio.play()
initAudio()
revealName()
document.removeEventListener("click",unlock)
}

/* name */

const name="A.S"
const container=document.getElementById("username")

name.split("").forEach(l=>{
const span=document.createElement("span")
span.textContent=l
span.classList.add("name-letter")
container.appendChild(span)
})

function revealName(){
document.querySelectorAll(".name-letter")
.forEach((l,i)=>{
setTimeout(()=>l.classList.add("show"),i*80)
})
}

/* typewriter */

const texts=[
"Graphic Designer",
"User suspected of being too cool",
"Into posters and stuff",
"DM me on IG!!!"
]

let textIndex=0
let charIndex=0
let typing=true
const typeElement=document.getElementById("typewriter")

function typeEffect(){

let current=texts[textIndex]

if(typing){

typeElement.textContent=current.substring(0,charIndex++)
if(charIndex>current.length){
typing=false
setTimeout(typeEffect,1000)
return
}

}else{

typeElement.textContent=current.substring(0,charIndex--)
if(charIndex==0){
typing=true
textIndex=(textIndex+1)%texts.length
}

}

setTimeout(typeEffect,typing?40:25)

}

typeEffect()

/* quotes */

const quotes=document.querySelectorAll(".quote")
let current=0

setInterval(()=>{
quotes[current].classList.remove("active")
current=(current+1)%quotes.length
quotes[current].classList.add("active")
},5000)

/* speaker */

const speakerBtn=document.getElementById("speakerBtn")
const speakerIcon=document.getElementById("speakerIcon")

let muted=false

speakerBtn.onclick=()=>{
muted=!muted
audio.muted=muted
speakerIcon.innerHTML=muted
? `<path d="M16 12l5 5-1.5 1.5L14.5 13.5 10 18H6v-6H3V9h3V3h4l5 4z"/>`
: `<path d="M3 9v6h4l5 4V5L7 9H3z"/>`
}

/* visualizer */

const vis=document.getElementById("visualizer")
const vctx=vis.getContext("2d")

function resizeVis(){
vis.width=vis.offsetWidth
vis.height=110
}

resizeVis()
window.addEventListener("resize",resizeVis)

let audioCtx,analyser,source,dataArray

function initAudio(){

audioCtx=new (window.AudioContext||window.webkitAudioContext)()

analyser=audioCtx.createAnalyser()
analyser.fftSize=512

source=audioCtx.createMediaElementSource(audio)

source.connect(analyser)
analyser.connect(audioCtx.destination)

dataArray=new Uint8Array(analyser.frequencyBinCount)

draw()

}

function draw(){

requestAnimationFrame(draw)

if(!analyser) return

analyser.getByteFrequencyData(dataArray)

vctx.clearRect(0,0,vis.width,vis.height)

const bars=80
const barWidth=vis.width/bars
const baseline=vis.height

vctx.fillStyle="rgb(255,0,80)"

for(let i=0;i<bars;i++){

let index=Math.floor((i/bars)*dataArray.length)
let value=dataArray[index]/255
let height=value*70

let x=i*barWidth
let y=baseline-height
let radius=barWidth/2

vctx.beginPath()
vctx.moveTo(x,y+radius)
vctx.arcTo(x,y,x+barWidth,y,radius)
vctx.arcTo(x+barWidth,y,x+barWidth,y+height,radius)
vctx.lineTo(x+barWidth,y+height)
vctx.lineTo(x,y+height)
vctx.closePath()

vctx.fill()

}

}

</script>

</body>
</html>
